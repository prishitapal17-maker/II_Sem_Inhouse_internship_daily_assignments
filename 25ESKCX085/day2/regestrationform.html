<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Registration</title>
    <link rel="stylesheet" href="formstylesheet.css">
    <style>
        h1{
            color: rgb(241, 6, 124) ;
        }
    </style>
</head>

<body id="body">
    <div id="divform"></div>
<form class="background">
    <h1 style="color: blue;">Registration Form</h1>
    <p>Submit this form for online registration</p>

    <label>
        Name:
    <input type="text" name="txtname" id="txtname" required placeholder="enter your name" class="rounded">
    </label>
    <br>
    <label>
        E-mail:
    <input type="email" id="txtemail" required placeholder="enter your email"class="rounded">
    </label>
    <br>
    <label>
        Phone no.:
    <input type="text" id="txtphone" required placeholder="enter your phone"class="rounded">
    </label>
<br>
    <label>
    Gender:
    <br>
    <input type="radio" id="check-male" name="gender">
    <label for="check-male">male</label>
<br>
    <input type="radio" id="check-female" name="gender">
    <label for="check-female">female</label>
<br>
    <input type="radio" id="check-transgender" name="gender">
    <label for="check-transgender">transgender</label>
<br>
<input type="radio" id="check-other" name="gender">
    <label for="check-other">other</label>
    <br>
    <input type="radio" id="check-prefer not to say" name="gender">
    <label for="check-prefer not to say">prefer not to say</label>
<br>
</label>
    <label for="dtdob">D.O.B :</label>
    <input type="date" id="dtdob" name="dtdob">
<br>


    <label for="pwdconfirmpassword">Confirm Password</label>
<input type="password" id="pwdconfirmpassword" name="pwdconfirmpassword">
<br>
<input type="submit" id="bntsubmit">

</form>

</body>
</html>
